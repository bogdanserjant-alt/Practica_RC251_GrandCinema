<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8">
  <title>Grand Cinema</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      background: #000;
      color: #fff;
    }

    /* HEADER */
    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px 50px;
      background: #111;
    }

    .logo {
      font-size: 24px;
      font-weight: bold;
    }

    .nav {
      display: flex;
      gap: 20px;
    }

    .nav a {
      color: white;
      text-decoration: none;
    }

    /* HERO */
    .hero {
      height: 90vh;
      background: url("assets/img/sala.jpg") center/cover no-repeat;
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
    }

    .hero-content {
      background: rgba(0,0,0,0.7);
      padding: 40px;
      border-radius: 10px;
    }

    .hero h1 {
      font-size: 40px;
    }

    .hero span {
      color: red;
    }

    .hero p {
      margin: 15px 0;
    }

    .btn {
      padding: 10px 20px;
      border: none;
      cursor: pointer;
      margin: 5px;
    }

    .btn-primary {
      background: red;
      color: white;
    }

    .btn-secondary {
      background: white;
      color: black;
    }

    /* SECTION */
    .experienta {
      padding: 50px;
      text-align: center;
    }

    .cards {
      display: flex;
      gap: 20px;
      justify-content: center;
      flex-wrap: wrap;
      margin-top: 30px;
    }

    .card {
      width: 300px;
      background: #111;
      border-radius: 10px;
      overflow: hidden;
    }

    .card img {
      width: 100%;
      height: 200px;
      object-fit: cover;
    }

    .card h3 {
      padding: 15px;
    }
  </style>
</head>

<body>

  <!-- HEADER -->
  <header>
    <div class="logo">🎬 GRAND CINEMA</div>

    <div class="nav">
      <a href="#">Acum în cinema</a>
      <a href="#">În curând</a>
      <a href="#">Experiențe</a>
      <a href="#">Carduri cadou</a>
    </div>
  </header>

  <!-- HERO -->
  <section class="hero">
    <div class="hero-content">
      <h1>Experimentează cinematograful <span>Ca Niciodată</span></h1>
      <p>Scufundă-te în magia ecranului de argint</p>

      <button class="btn btn-primary">Vezi filme</button>
      <button class="btn btn-secondary">Rezervă bilete</button>
    </div>
  </section>

  <!-- EXPERIENȚĂ -->
  <section class="experienta">
    <h2>Experiența Cinema</h2>

    <div class="cards">

      <div class="card">
        <img src="assets/img/cinema.jpg" alt="">
        <h3>Producție Film</h3>
      </div>

      <div class="card">
        <img src="assets/img/postere.jpg" alt="">
        <h3>Filme Celebre</h3>
      </div>

      <div class="card">
        <img src="assets/img/proiector.jpg" alt="">
        <h3>Tehnologie Modernă</h3>
      </div>

    </div>
  </section>

</body>
</html>
